version: 2.0

params:
  - name: internal
    value: "NO"
  - name: pluginVersion
    value: "0.0.1"
  - name: releaseVersion
    value: "0.0.0.1-SNAPSHOT"
  - name: serverBranch
    value: "dev_ci"
  - name: buildVersion
    value: "0.0.1"
  - name: onlyWin
    value: true



env:
  label: Bitfun2Yellow_x64_vpc # 虚拟机标签，表示在哪台虚拟机执行，都写deveco_build
buildflows:
  - condition: onlyWin == true
    jobs:
      - job: buildWin
        build_ref: .cloudbuild/buildWin.yml
  - condition: onlyWin == false
    jobs:
      - job: buildWin
        build_ref: .cloudbuild/buildWin.yml
      - job: buildLinux
        build_ref: .cloudbuild/buildLinux.yml

