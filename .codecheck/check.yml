version: 2.0 # 注意缩进
#工具参数
tool_params:
  secsolar: # secBrella
    compile_script: sh .cloudbuild/build.sh
  pclint-plus: #定义pclintplus执行需要的参数
    lnt_path: $WORKSPACE/code/.cloudbuild
    lnt_main: project.lnt
    lnt_env:  
    compiler: $WORKSPACE/code/.cloudbuild/co-gcc.lnt
    env_setting:
    prepare_shell_script: 
    prepare_work_dir: 
  binscope: 
    scan_dirs: output
    relative_dir: output
  clangtidy:
    compilerCommandsPath: .cloudbuild/compile_commands.json
steps:
  pre_codecheck:
    - checkout
    - codehub: 
        url: https://open.codehub.huawei.com/OpenSourceCenter/google/googletest
        branch: refs/tags/release-1.11.0
        path: third_party/googletest
    - codehub: 
        url: https://open.codehub.huawei.com/OpenSourceCenter/libuv/libuv
        branch: refs/tags/v1.44.1
        path: third_party/libuv
    - codehub: 
        url: https://open.codehub.huawei.com/OpenSourceCenter/www.sqlite.org/sqlite
        branch: refs/tags/3.37.2-h3
        path: third_party/sqlite_src
    - codehub: 
        url: https://open.codehub.huawei.com/OpenSourceCenter/uNetworking/uWebSockets
        branch: refs/tags/v20.10.0
        path: third_party/uWebSockets
    - codehub: 
        url: https://szv-open.codehub.huawei.com/OpenSourceCenter/uNetworking/uSockets.git
        branch: refs/tags/v0.8.1
        path: third_party/uSockets
    - codehub: 
        url: https://szv-open.codehub.huawei.com/OpenSourceCenter/nlohmann/json.git
        branch: refs/tags/v3.10.1
        path: third_party/json
    - codehub: 
        url: https://open.codehub.huawei.com/OpenSourceCenter/grpc/grpc
        branch: refs/tags/v1.36.1
        path: third_party/grpc
    - codehub: 
        url: https://open.codehub.huawei.com/OpenSourceCenter/boringssl.googlesource.com/boringssl
        branch: refs/tags/b9232f9e27e5668bc0414879dcdedb2a59ea75f2
        path: third_party/grpc/third_party/boringssl-with-bazel
    - codehub: 
        url: https://open.codehub.huawei.com/OpenSourceCenter/c-ares/c-ares
        branch: refs/tags/cares-1_16_1-h2
        path: third_party/grpc/third_party/cares/cares
    - codehub: 
        url: https://open.codehub.huawei.com/OpenSourceCenter/madler/zlib
        branch: refs/tags/1.2.11-h3
        path: third_party/grpc/third_party/zlib
    - codehub: 
        url: https://open.codehub.huawei.com/OpenSourceCenter/google/re2
        branch: refs/tags/2019-12-01
        path: third_party/grpc/third_party/re2
    - codehub: 
        url: https://open.codehub.huawei.com/OpenSourceCenter/protocolbuffers/protobuf
        branch: refs/tags/3.13.0-h15
        path: third_party/grpc/third_party/protobuf
    - codehub: 
        url: https://open.codehub.huawei.com/OpenSourceCenter/abseil/abseil-cpp
        branch: refs/tags/20200923.3-h2
        path: third_party/grpc/third_party/abseil-cpp
    - sh:
        command: |
          cd code/.cloudbuild
          sh ${ALLSHPATH}
          sed -i '/--i/a --i"'"${WORKSPACE}"'/code/third_party/grpc/install/include"' $WORKSPACE/code/.cloudbuild/co-gcc.lnt
        effect_tool: pclint-plus,binscope,clangtidy