version: 2.0 # 注意缩进
#工具参数
tool_params:
  secsolar: # secBrella
    compile_script: sh .cloudbuild/build.sh
  pclint-plus: #定义pclintplus执行需要的参数
    lnt_path: $WORKSPACE/code/.codecheck/pclintplus
    lnt_main: ascend-insight.lnt
    lnt_env:  
    compiler: $WORKSPACE/code/.codecheck/pclintplus/co-gcc.lnt
    env_setting:
    prepare_shell_script: 
    prepare_work_dir: 
  binscope: 
    scan_dirs: output
    relative_dir: output
  clangtidy:
    compilerCommandsPath: .cloudbuild/compile_commands.json
steps:
  pre_codecheck:
    - checkout
    - codehub: 
        url: https://open.codehub.huawei.com/OpenSourceCenter/google/googletest
        branch: refs/tags/release-1.11.0
        path: third_party/googletest
    - codehub: 
        url: https://open.codehub.huawei.com/OpenSourceCenter/libuv/libuv
        branch: refs/tags/v1.44.2
        path: third_party/libuv
    - codehub: 
        url: https://open.codehub.huawei.com/OpenSourceCenter/www.sqlite.org/sqlite
        branch: refs/tags/3.40.1
        path: third_party/sqlite_src
    - codehub: 
        url: https://open.codehub.huawei.com/OpenSourceCenter/uNetworking/uWebSockets
        branch: refs/tags/v20.10.0
        path: third_party/uWebSockets
    - codehub: 
        url: https://szv-open.codehub.huawei.com/OpenSourceCenter/uNetworking/uSockets.git
        branch: refs/tags/v0.8.1
        path: third_party/uSockets
    - codehub: 
        url: https://szv-open.codehub.huawei.com/OpenSourceCenter/nlohmann/json.git
        branch: refs/tags/v3.10.1
        path: third_party/json
    - codehub:
        url: https://szv-open.codehub.huawei.com/OpenSourceCenter/Tencent/rapidjson.git
        branch: refs/tags/012be8528783cdbf4b7a9e64f78bd8f056b97e24
        path: third_party/rapidjson
    - sh:
        command: |
          cd code && sh .cloudbuild/build.sh
        effect_tool: binscope