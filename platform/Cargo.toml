[package]
name = "MindStudio_Insight"
version = "0.1.0"
edition = "2021"
build = "build.rs"
include = ["../resources"]

[profile.dev]
opt-level = 1

[profile.release]
opt-level = 3
strip = "symbols"
relocation_model = "pic/pie"

[dependencies]
wry = {registry = "openSources", version="0.24.3", features = ["file-drop"] }
