version: 2.0

params:
  - name: product
    value: cloudbuild2.0
  - name: pluginVersion
    value: "6.0.RC3.1"
  - name: extensionVersion
    value: "6.3.1"
  - name: serverBranch
    value: "dev_ci"

env:
  label: Bitfun2Yellow_x64_vpc # è™ڑو‹ںوœ؛و ‡ç­¾ï¼Œè،¨ç¤؛هœ¨ه“ھهڈ°è™ڑو‹ںوœ؛و‰§è،Œï¼Œéƒ½ه†™deveco_build
steps:
  PRE_BUILD:
    - checkout:
        path: IntelliJ_Based # و؛گç پن¸‹è½½هˆ°ه­گç›®ه½•ï¼Œه‘½هگچè¯·è·ں cloneن¸‹و‌¥çڑ„é»کè®¤هگچç§°ن¸€è‡´
    - codehub:
        url: https://codehub-dg-y.huawei.com/IDE-Insight/Ascend/Insight_Kernel.git
        branch: ${serverBranch}
        path: Insight_Kernel
  BUILD:
    - build_execute: # masterç”¨0.0.0.1-SNAPSHOT ه’Œ 0.0.0.1ï¼Œ  developç”¨0.0.0.2-SNAPSHOTï¼Œه’Œ 0.0.0.2
        command: |
          echo ---------------build frontend----------------------
          cd Insight_Kernel/packages/frontend
           npm config set strict-ssl false
           npm install --force
           npm run build
          echo ---------------build server source----------------------
          cd ../server
           npm install
           npm run build
           cp -r ./dist/* ./buildServer/
          echo ---------------build server binary----------------------
          cd buildServer
           npm install
           node_modules/.bin/electron-packager ./ profiler-server --platform=linux --arch=x64 --electron-version=24.6.5 --download.mirrorOptions.mirror=http://mirrors.tools.huawei.com/electron/ 
           rm -rf profiler-server-linux-x64/locales
          cd ../../../
          mkdir serverBuild
          mkdir serverBuild/server
           cp -r ./packages/frontend/build ./packages/extension/profiler
           cp -r ./packages/server/buildServer/profiler-server-linux-x64/* ./serverBuild/server/
          echo ---------------build vscode extension----------------------
          cd ./packages/extension
          npm install
          npm install keytar@7.9.0 --ignore-scripts
          npm install @vscode/vsce@2.15.0  --registry=https://cmc.centralrepo.rnd.huawei.com/npm/
          npm install vsce@2.15.0 --registry=https://cmc.centralrepo.rnd.huawei.com/npm/
          npm version ${extensionVersion} --no-git-tag-version --allow-same-version;
            node_modules/.bin/vsce package
          cd ../../../
          mkdir ./IntelliJ_Based/profiler
          mkdir ./IntelliJ_Based/profiler/server
          cp -r ./Insight_Kernel/packages/frontend/build ./IntelliJ_Based/foundation/ideaplugin/src/main/resources/frontend/
          cp -r ./Insight_Kernel/serverBuild/server/* ./IntelliJ_Based/profiler/server/
          echo ---------------build intellij plugin----------------------
          cd ./IntelliJ_Based
          chmod +x ./gradlew
           ./gradlew buildPlugin -PPluginVersion=${pluginVersion}
          cd ..
          mkdir build
           cp Insight_Kernel/packages/extension/ascend-insight-extension-${extensionVersion}.vsix build/
           cp IntelliJ_Based/build/distributions/ascend-insight-${pluginVersion}.zip build/
          echo ---------------uploading-----------------------
          cd build
           tar -czvf ../build.tar.gz *
        check: true
  POST_BUILD:
    - get_build_metadata
    - artget:
        artifact_type: cloudartifact  # ن»“ه؛“ç±»ه‍‹
        file_path: build.tar.gz
    - version_set #é€ڑه¸¸ه»؛è®®ه°†è؟™ن¸ھوڈ’ن»¶ن¸€èµ·é…چç½®ن¸ٹï¼Œن¸»è¦پç”¨ن؛ژن¸ٹن¼ versionset
    - get_build_metadata