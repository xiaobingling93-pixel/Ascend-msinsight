version: 2.0 # 注意缩进
#工具参数
steps:
  pre_codecheck:
    - checkout
    - sh:
        command: | # 写入.codecheck/build.sh
          fpath=$(pwd)/code/.codecheck/build.sh
          if [ ! -d "$(pwd)/code/.codecheck" ] ; then mkdir $(pwd)/code/.codecheck ; fi
          if [ -d "${fpath}" ] ; then rm ${fpath} ; fi
          touch $fpath
          rm -rf jdk17
          rm -rf OpenJDK17-jdk_x64_linux_hotspot_17_35.tar.gz
          wget --no-check-certificate https://cmc-hgh-artifactory.cmc.tools.huawei.com/artifactory/opensource_general/AdoptOpenJDK17/17+35/package/OpenJDK17-jdk_x64_linux_hotspot_17_35.tar.gz
          tar -zxvf OpenJDK17-jdk_x64_linux_hotspot_17_35.tar.gz
          rm -rf OpenJDK17-jdk_x64_linux_hotspot_17_35.tar.gz
          mv jdk-17+35/ jdk17
          cd jdk17/lib/security
          wget --no-check-certificate  https://cmc-szver-artifactory.cmc.tools.huawei.com/artifactory/CMC-Release/certificates/HuaweiITRootCA.cer
          wget --no-check-certificate  https://cmc-szver-artifactory.cmc.tools.huawei.com/artifactory/CMC-Release/certificates/HWITEnterpriseCA1.cer
          keytool -keystore cacerts -importcert -alias HuaweiITRootCA -file HuaweiITRootCA.cer -storepass changeit -noprompt
          keytool -keystore cacerts -importcert -alias HWITEnterpriseCA1 -file HWITEnterpriseCA1.cer -storepass changeit -noprompt
          cd ../../../
          jdkhome=$(pwd)/jdk17
          echo '#! /bin/bash' >> $fpath
          echo 'export JAVA_HOME='$jdkhome >> $fpath
          echo 'export PATH=$JAVA_HOME/bin:$PATH' >> $fpath
          echo 'chmod +x gradlew' >> $fpath
          echo './gradlew build --no-daemon --stacktrace --refresh-dependencies' >> $fpath

tool_params:
  secsolar: # secBrella
    compile_script: sh .codecheck/build.sh