apiversion: modelslim_v1
metadata:
  config_id: modelslim_v1_all_process
  score: 90
  label:
    w_bit: 8
    a_bit: 8
    is_sparse: False
    kv_cache: True

spec:
  process:
    - type: "iter_smooth"  # iter smooth
      alpha: 0.9
      scale_min: 1e-5
    
    - type: "flex_smooth_quant"  # flex smooth

    - type: "kv_smooth"  # kv smooth
      smooth_factor: 1.0
      include: 
        - "*"

    - type: "dynamic_cache"  # c8
      qconfig:
        scope: "per_channel"
        dtype: "int8" 
        symmetric: True 
        method: "minmax"
      include: 
        - "*"
    
    - type: "linear_quant"  # w8a8 minmax
      qconfig:
        act:
          scope: "per_tensor"   # default is per_tensor
          dtype: "int8"        # default is int8
          symmetric: False      # default is True
          method: "minmax"      # default is minmax
        weight:
          scope: "per_channel"   # default is per_channel
          dtype: "int8"        # default is int8
          symmetric: True       # default is True
          method: "minmax"      # default is minmax
      include: ["*"]

    - type: "linear_quant"  # histogram
      qconfig:
        act:
          scope: "per_tensor"   # default is per_tensor
          dtype: "int8"        # default is int8
          symmetric: False     # default is True
          method: "histogram"      # default is minmax
        weight:
          scope: "per_channel"   # default is per_channel
          dtype: "int8"        # default is int8
          symmetric: True       # default is True
          method: "minmax"      # default is minmax
      include: ["*"]

    - type: "linear_quant"  # ssz
      qconfig:
        act:
          scope: "per_tensor"   # default is per_tensor
          dtype: "int8"        # default is int8
          symmetric: False      # default is True
          method: "minmax"      # default is minmax
        weight:
          scope: "per_channel"   # default is per_channel
          dtype: "int8"        # default is int8
          symmetric: True       # default is True
          method: "ssz"      # default is minmax
      include: ["*"]

    - type: "float_sparse"  # 浮点稀疏处理器
      sparse_ratio: 0.25
      include: ["*"]
      exclude: []
    
  save:
    - type: "ascendv1_saver"
      part_file_size: 4