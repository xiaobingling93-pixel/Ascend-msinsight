apiversion: modelslim_v1
metadata:
  config_id: qwen3-dense-w16a16s-v1
  score: 90
  verified_model_types:
    - Qwen3-32B
    - Qwen3-14B
    - Qwen3-8B
    - Qwen3-0.6B
  label:
    w_bit: 16
    a_bit: 16
    is_sparse: False
    kv_cache: False

spec:
  process:
    - type: "float_sparse"  # 浮点稀疏处理器
      sparse_ratio: 0.25
      include: ["*"]
      exclude: []

  save:
    - type: "ascendv1_saver"
      part_file_size: 4
  dataset: "./mix_data50.jsonl"